<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redondear</title>
</head>
<body>
    <script>
        //Math.round nos sirve para redondear un numero con muchos decimales para poder simplificar el mismo
        function redondear(decimal){
            return Math.round(decimal);
        }
        //Tambien tenemos dos metodos mas: '.floor' que nos redondea el numero siempre hacia abajo (sin importar el decimal) y '.ceil' que es lo opuesto a floor.
    </script>
</body>
</html>
