<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parametros</title>
</head>
<body>
    <p>Primer numero</p>
    <input type="number" id="primerNumero">
    <p>Segundo numero</p>
    <input type="number" id="segundoNumero">
<br><br>
    <button onclick="mostrarResultado()">Calcular</button>
<h2 id="textoResultado"></h2>

    <script>
        //git prueba
        //Un parametro son valores que pueden ser agregados en los parentesis '()' de una funcion. Por lo que al ser llamada 'funcion(a, b)' estos mismos definiran el resultado final.
        function sumar(numero1, numero2){
        //Agregar el simbolo '+' antes de una variable numerica, permite realizar operaciones matematicas en lugar de concatenar el contenido.
            resultado = +numero1 + +numero2;
            return resultado;
        }

        function mostrarResultado(){
            let elemento1 = document.getElementById("primerNumero");
            let elemento2 = document.getElementById("segundoNumero");
            let elementoTexto = document.getElementById("textoResultado");
            let elementoSuma = sumar(elemento1.value, elemento2.value);

            elementoTexto.textContent = elementoSuma;
        }
    </script>
</body>
</html>
